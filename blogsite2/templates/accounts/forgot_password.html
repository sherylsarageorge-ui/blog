{% extends 'base.html' %}
{% block title %}Forgot Password — ShareCanvas{% endblock %}
{% block content %}
<div class="form-wrap">
  <h1>Reset Password</h1>
  <p class="sub">Enter your registered email address</p>
  <form method="POST">
    {% csrf_token %}
    <div class="fg">
      <label>Email Address</label>
      <input type="email" name="email" autofocus>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Send Reset Link</button>
  </form>
  <p style="margin-top:1rem;text-align:center;font-size:0.88rem;color:var(--muted)">
    <a href="{% url 'login' %}" style="color:var(--accent)">Back to login</a>
  </p>
</div>
{% endblock %}
