{% extends 'base.html' %}
{% block title %}Edit Comment — ShareCanvas{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto;">
  <h1 style="font-family:'Cormorant Garamond',serif;font-size:1.9rem;margin-bottom:1.5rem;">Edit Comment</h1>
  <form method="POST">
    {% csrf_token %}
    <div class="fg"><textarea name="content" rows="5" style="resize:vertical;">{{ comment.content }}</textarea></div>
    <div style="display:flex;gap:0.75rem;">
      <button type="submit" class="btn btn-primary">Update</button>
      <a href="{% url 'post_detail' comment.post.id %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
