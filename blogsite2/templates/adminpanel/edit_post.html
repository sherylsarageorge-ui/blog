{% extends 'base.html' %}
{% block title %}Edit Post — Admin{% endblock %}
{% block content %}
<div style="max-width:720px;margin:0 auto;">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;">
    <a href="{% url 'admin_dashboard' %}" style="color:var(--muted);font-size:0.88rem;">← Back to Admin</a>
  </div>
  <h1 style="font-family:'Cormorant Garamond',serif;font-size:2rem;margin-bottom:2rem;">Edit Post</h1>
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="fg">
      <label>Title</label>
      <input type="text" name="title" value="{{ post.title }}">
    </div>
    <div class="fg">
      <label>Content</label>
      <textarea name="content" rows="15" style="resize:vertical;">{{ post.content }}</textarea>
    </div>
    <div class="fg">
      <label>Replace Cover Image</label>
      {% if post.image %}
      <img src="{{ post.image.url }}" style="display:block;max-height:120px;border-radius:6px;margin-bottom:0.5rem;">
      {% endif %}
      <input type="file" name="image" accept="image/*">
    </div>
    <div style="display:flex;gap:0.75rem;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'admin_dashboard' %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
